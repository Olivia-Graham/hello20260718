<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登陆少年梦寐以求演唱会直拍机位 · 销量监控</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YVZFJE55GF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-YVZFJE55GF');
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f7f5; --surface: #ffffff; --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1); --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e99;
    --green: #3b6d11; --red: #a32d2d; --amber: #ba7517;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1); --text: #f0ede6; --text2: #a8a8a2; --text3: #6b6b67;
    }
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; line-height: 1.6; }
  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }
  .page-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text2); }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
  .status-row { display: flex; align-items: center; gap: 7px; margin-top: 8px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: var(--green); }
  .dot-loading { background: var(--amber); animation: blink 1.2s ease infinite; }
  .dot-error { background: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .refresh-btn { border: 0.5px solid var(--border); background: var(--surface); color: var(--text2); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0; }
  .refresh-btn:hover { background: var(--surface2); }
  .section { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .section-header { padding: 12px 16px; border-bottom: 0.5px solid var(--border); font-size: 13px; font-weight: 500; color: var(--text2); display: flex; align-items: center; justify-content: space-between; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 500; color: var(--text3); background: var(--surface2); border-bottom: 0.5px solid var(--border); }
  td { padding: 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; overflow: hidden; }
  tr:last-child td { border-bottom: none; }
  .rank-badge { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .r1 { background: #fac775; color: #412402; }
  .r2 { background: #d3d1c7; color: #2c2c2a; }
  .r3 { background: #f5c4b3; color: #4a1b0c; }
  .rn { background: var(--surface2); color: var(--text3); }
  .sold-num { font-size: 15px; font-weight: 600; }
  .gap-num { font-size: 12px; color: var(--red); white-space: nowrap; }
  .chart-section { padding: 16px; }
  .chart-wrap { position: relative; width: 100%; height: 260px; }
  .error-banner { background: #fcebeb; border: 0.5px solid #f09595; color: #a32d2d; border-radius: 10px; padding: 14px 16px; font-size: 13px; margin-bottom: 16px; line-height: 1.7; }
  .footer { text-align: center; font-size: 12px; color: var(--text3); margin-top: 28px; }
  .tab-group { display: flex; gap: 6px; }
  .tab { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; }
  .tab.active { background: var(--surface2); color: var(--text); border-color: var(--border); font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="page-title">登陆少年梦寐以求演唱会直拍机位 · 销量监控</div>
      <div class="page-sub">成员机位实时销量数据</div>
      <div class="status-row">
        <div class="dot dot-loading" id="dot"></div>
        <span style="font-size:12px;color:var(--text2);" id="statusText">正在加载...</span>
      </div>
    </div>
    <button class="refresh-btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M13 2v3h-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      刷新
    </button>
  </div>

  <div id="errorBanner" style="display:none" class="error-banner"></div>

  <div class="section" style="margin-bottom:16px;">
    <div class="section-header">销量排行</div>
    <table>
      <colgroup>
        <col style="width:44px">
        <col style="width:30%">
        <col>
        <col style="width:28%">
      </colgroup>
      <thead><tr>
        <th>排名</th>
        <th>成员</th>
        <th>销量</th>
        <th>落后</th>
      </tr></thead>
      <tbody id="tableBody">
        <tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text3);">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-header">
      <span>销量趋势</span>
      <div class="tab-group">
        <button class="tab active" onclick="setRange('2h', this)">近2小时</button>
        <button class="tab" onclick="setRange('24h', this)">近24小时</button>
        <button class="tab" onclick="setRange('all', this)">全部</button>
      </div>
    </div>
    <div class="chart-section">
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
  </div>

  <div class="footer">数据来源：快手 &nbsp;·&nbsp; 每10分钟自动更新</div>
</div>

<script>
let chartInstance = null;
let currentRange = '2h';
let allHistory = [];

const COLORS = {
  '苏新皓': '#ee3f4d',
  '张泽禹': '#21a675',
  '朱志鑫': '#fbefd7',
  '张极':   '#ffb06b',
  '左航':   '#093a81',
  '登陆少年组合': '#5c6bc0',
};

function setRange(range, el) {
  currentRange = range;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderChart(allHistory);
}

function filterHistory(history, range) {
  const now = new Date();
  if (range === '2h') {
    const cutoff = new Date(now - 2 * 60 * 60 * 1000);
    return history.filter(r => new Date(r.recorded_at) >= cutoff);
  } else if (range === '24h') {
    const cutoff = new Date(now - 24 * 60 * 60 * 1000);
    return history.filter(r => new Date(r.recorded_at) >= cutoff);
  }
  return history;
}

function bucketHistory(history, range) {
  if (range === '2h') {
    return bucketByMinutes(history, 10);
  } else if (range === '24h') {
    return bucketByMinutes(history, 60);
  } else {
    return bucketByMinutes(history, 720);
  }
}

function bucketByMinutes(history, intervalMinutes) {
  const buckets = {};
  history.forEach(r => {
    const d = new Date(r.recorded_at);
    const ms = intervalMinutes * 60 * 1000;
    const bucketTime = new Date(Math.floor(d.getTime() / ms) * ms);
    const key = bucketTime.toISOString();
    if (!buckets[key]) buckets[key] = {};
    if (!buckets[key][r.label] || new Date(r.recorded_at) > new Date(buckets[key][r.label].recorded_at)) {
      buckets[key][r.label] = r;
    }
  });
  const result = [];
  Object.entries(buckets).sort().forEach(([time, labels]) => {
    Object.values(labels).forEach(r => {
      result.push({ ...r, recorded_at: time });
    });
  });
  return result;
}

async function loadData() {
  setStatus('loading', '正在获取...');
  try {
    const [salesRes, historyRes] = await Promise.all([
      fetch('/api/sales'),
      fetch('/api/history'),
    ]);
    if (!salesRes.ok) throw new Error('服务器返回 ' + salesRes.status);
    const sales = await salesRes.json();
    const history = historyRes.ok ? await historyRes.json() : [];
    allHistory = history;
    render(sales, history);
    document.getElementById('errorBanner').style.display = 'none';
  } catch(e) {
    setStatus('error', '连接失败');
    const b = document.getElementById('errorBanner');
    b.style.display = 'block';
    b.innerHTML = `<b>无法连接到后端</b><br>请确认已运行 <code>python3 server.py</code>，然后再刷新页面。<br><small>错误详情：${e.message}</small>`;
  }
}

function setStatus(type, text) {
  document.getElementById('dot').className = 'dot dot-' + type;
  document.getElementById('statusText').textContent = text;
}

function toBeijingTime(utcStr, showDate) {
  if (!utcStr) return '';
  const d = new Date(utcStr.replace(' ', 'T').endsWith('Z') ? utcStr.replace(' ', 'T') : utcStr.replace(' ', 'T') + 'Z');
  const opts = showDate
    ? { timeZone: 'Asia/Shanghai', hour12: false, month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }
    : { timeZone: 'Asia/Shanghai', hour12: false, month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
  return d.toLocaleString('zh-CN', opts).replace(/\//g, '-');
}

function render(sales, history) {
  setStatus('ok', '已更新 · ' + toBeijingTime(sales.updated_at));
  const data = sales.data || [];
  const sorted = [...data].sort((a, b) => (b.soldNumber ?? -1) - (a.soldNumber ?? -1));
  const rankClass = i => ['r1','r2','r3'][i] ?? 'rn';

  document.getElementById('tableBody').innerHTML = sorted.map((d, i) => {
    const prev = sorted[i - 1];
    const gap = i === 0 ? null : (prev?.soldNumber != null && d.soldNumber != null ? prev.soldNumber - d.soldNumber : null);
    const gapCell = i === 0
      ? `<span style="color:var(--text3);">—</span>`
      : `<span class="gap-num">-${gap != null ? gap.toLocaleString() : '?'}</span>`;
    return `<tr>
      <td><span class="rank-badge ${rankClass(i)}">${i+1}</span></td>
      <td><div style="font-weight:500;">${d.label}</div></td>
      <td><span class="sold-num">${d.soldNumber != null ? d.soldNumber.toLocaleString() : '—'}</span></td>
      <td>${gapCell}</td>
    </tr>`;
  }).join('');

  renderChart(history);
}

function renderChart(history) {
  const filtered = filterHistory(history, currentRange);
  const bucketed = bucketHistory(filtered, currentRange);

  if (!bucketed || bucketed.length === 0) {
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    return;
  }

  const members = [...new Set(bucketed.map(r => r.label))].sort((a, b) => {
    const latest = label => {
      const rows = bucketed.filter(r => r.label === label);
      return rows.length ? rows[rows.length - 1].sold_number ?? 0 : 0;
    };
    return latest(b) - latest(a);
  });

  const allTimes = [...new Set(bucketed.map(r => r.recorded_at))].sort();
  const labels = allTimes.map(t => toBeijingTime(t, true));

  const datasets = members.map(label => {
    const memberData = bucketed.filter(r => r.label === label);
    const dataMap = Object.fromEntries(memberData.map(r => [r.recorded_at, r.sold_number]));
    return {
      label,
      data: allTimes.map(t => dataMap[t] ?? null),
      borderColor: COLORS[label] || '#888',
      backgroundColor: COLORS[label] || '#888',
      borderWidth: 2,
      pointRadius: 3,
      pointHoverRadius: 6,
      tension: 0.3,
      spanGaps: true,
    };
  });

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { boxWidth: 12, font: { size: 12 }, padding: 16 }
        },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}：${ctx.parsed.y != null ? ctx.parsed.y.toLocaleString() : '—'}`
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 10 }, maxRotation: 45, maxTicksLimit: 12 }
        },
        y: {
          grid: { color: 'rgba(128,128,128,0.08)' },
          ticks: { font: { size: 11 }, callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v }
        }
      }
    }
  });
}

loadData();
setInterval(loadData, 600000);
</script>
</body>
</html>
